version: '3.8'

services:
  django-app:
    build: .
    container_name: ip-search-engine

    ports:
      - "8005:8005"   # match your Django runserver port

    extra_hosts:
      - "host.docker.internal:host-gateway"

    environment:
      # 🔥 License system (IMPORTANT)
      - MACHINE_ID=${MACHINE_ID}

      # Existing environment variables
      - SEARCH_ENGINE_URL=http://host.docker.internal:5000/search/
      - MONGO_HOST=host.docker.internal
      - MONGO_PORT=27017

      # Subscriber service
      - MONGO_URI=mongodb://host.docker.internal:27017/
      - MONGO_DB_NAME=subscriber_data
      - MAPPING_COLLECTION=Sdrcolumns
      - DATA_COLLECTION=subscribers
      - TILE_CACHE_DIR=/tmp/tile_cache

    volumes:
      - ./:/app
      - subscriber_temp:/tmp/subscriber_uploads

      # 🔥 IMPORTANT: persist license
      - ./data:/app/data

    restart: unless-stopped

volumes:
  subscriber_temp: